name: Weekly UTS + Prosple

on:
  schedule:
    - cron: '0 0 * * 0'   # AEST -> 10:00

  workflow_dispatch:

jobs:
  run-bots:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bot: [uts_events, prosple]  # run both at the same time
    env:
      BOT_NAME: ${{ matrix.bot }}
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      UTS_EVENTS_CHANNEL_ID: ${{ secrets.UTS_EVENTS_CHANNEL_ID }}
      PROSPLE_CHANNEL_ID: ${{ secrets.PROSPLE_CHANNEL_ID }}
      ADMIN_WEBHOOK_URL: ${{ secrets.ADMIN_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run bot
        run: python main.py
      
      # Upload debug artifacts if the bot fails
      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prosple-debug-${{ matrix.bot }}
          path: |
            prosple_debug_*.html
            prosple_debug_*.png
