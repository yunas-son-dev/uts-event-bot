name: Monthly UTS Academic Events

on:
  schedule:
    - cron: '0 22 1 * *'   # every month on the 1st at 08:00 AEST
  workflow_dispatch: 

jobs:
  send-academic-events:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          pip install python-dotenv requests bs4

      - name: Send monthly academic events
        run: python acad_calendar_monthly_webhook.py
        env:
          ACADEMIC_WEBHOOK_URL: ${{ secrets.ACADEMIC_WEBHOOK_URL }}
